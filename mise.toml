[tools]
uv = "latest"
swiftlint = "latest"
swiftformat = "latest"
"npm:@openapitools/openapi-generator-cli" = "latest"

[tasks.xcode-mcp]
run = "npx -y xcodebuildmcp@latest"

[tasks.lint]
run = "swiftlint App/PeerTubeSwift"

[tasks.format]
run = "swiftformat App/PeerTubeSwift"

[tasks.build]
run = "cd App/PeerTubeSwift && xcodebuild -project PeerTubeSwift.xcodeproj -scheme PeerTubeSwift -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 17' build"

[tasks.test]
run = "cd PeerTubeSwift && swift test"

[tasks.generate-client]
run = "openapi-generator-cli generate -i openapi.json -g swift6 -o PeertubeClientOpenAPI --global-property=tag:Video"

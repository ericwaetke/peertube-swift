[tools]
uv = "latest"
swiftlint = "latest"
swiftformat = "latest"
"npm:beads-ui" = "latest"
"npm:@openapitools/openapi-generator-cli" = "latest"

[tasks.beads]
run = "uvx beads-mcp"

[tasks.beads-ui]
run = "bdui start --open --port 3535"

[tasks.xcode-mcp]
run = "npx -y xcodebuildmcp@latest"

[tasks.lint]
run = "swiftlint"

[tasks.format]
run = "swiftformat ."

[tasks.build]
run = "cd PeerTubeSwift && swift build"

[tasks.test]
run = "cd PeerTubeSwift && swift test"

[tasks.generate-client]
run = "openapi-generator-cli generate -i openapi.json -g swift6 -o PeertubeClientOpenAPI --global-property=tag:Video"

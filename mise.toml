[tools]
uv = "latest"
swiftlint = "latest"
swiftformat = "latest"

[tasks.beads]
run = "uvx beads-mcp"

[tasks.xcode-mcp]
run = "npx -y xcodebuildmcp@latest"

[tasks.lint]
run = "swiftlint"

[tasks.format]
run = "swiftformat ."

[tasks.build]
run = "cd PeerTubeSwift && swift build"

[tasks.test]
run = "cd PeerTubeSwift && swift test"
